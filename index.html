<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시간관리 매트릭스 대시보드</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            word-break: keep-all;
        }
        .quadrant-textarea {
            min-height: 160px;
            scrollbar-width: thin;
            scrollbar-color: rgba(0,0,0,0.1) transparent;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <!-- 개발자 명시 -->
    <div class="bg-gray-900 text-white py-2 px-4 text-center text-[10px] md:text-xs font-light tracking-wider">
        개발자: 가치있는미래교육연구소 대표 김병찬
    </div>

    <div class="flex-1 max-w-5xl mx-auto w-full px-4 py-6 md:py-10">
        <!-- 헤더 -->
        <header class="mb-6 md:mb-10 text-center">
            <h1 class="text-3xl md:text-5xl font-black text-blue-600 mb-2 tracking-tight uppercase">
                시간관리 매트릭스
            </h1>
            <p class="text-sm md:text-base text-gray-500 font-medium tracking-tight">영역별 내용을 입력하면 스프레드시트로 자동 수합됩니다.</p>
        </header>

        <!-- 매트릭스 그리드 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
            
            <!-- Q1: 급한일-중요한일 -->
            <div class="flex flex-col border-2 border-red-500 rounded-2xl overflow-hidden shadow-sm bg-white transition-all hover:shadow-md focus-within:ring-2 focus-within:ring-red-200">
                <div class="p-4 bg-red-500 text-white">
                    <span class="block text-lg font-extrabold leading-tight">급한일-중요한일</span>
                    <span class="text-[10px] md:text-xs font-normal opacity-90 leading-normal">중요도가 높고 마감이 임박한 필수 과업</span>
                </div>
                <textarea id="q1" class="quadrant-textarea w-full p-5 resize-none focus:outline-none text-gray-700 leading-relaxed text-sm md:text-base" placeholder="이곳에 내용을 입력하세요..."></textarea>
            </div>

            <!-- Q2: 급하지 않은일-중요한일 -->
            <div class="flex flex-col border-2 border-blue-500 rounded-2xl overflow-hidden shadow-sm bg-white transition-all hover:shadow-md focus-within:ring-2 focus-within:ring-blue-200">
                <div class="p-4 bg-blue-500 text-white">
                    <span class="block text-lg font-extrabold leading-tight">급하지 않은일-중요한일</span>
                    <span class="text-[10px] md:text-xs font-normal opacity-90 leading-normal">지속적인 성장과 준비를 위한 핵심 과업</span>
                </div>
                <textarea id="q2" class="quadrant-textarea w-full p-5 resize-none focus:outline-none text-gray-700 leading-relaxed text-sm md:text-base" placeholder="이곳에 내용을 입력하세요..."></textarea>
            </div>

            <!-- Q3: 급한일-중요하지 않은일 -->
            <div class="flex flex-col border-2 border-orange-400 rounded-2xl overflow-hidden shadow-sm bg-white transition-all hover:shadow-md focus-within:ring-2 focus-within:ring-orange-100">
                <div class="p-4 bg-orange-400 text-white">
                    <span class="block text-lg font-extrabold leading-tight">급한일-중요하지 않은일</span>
                    <span class="text-[10px] md:text-xs font-normal opacity-90 leading-normal">방해 요소, 단순 처리, 불필요한 긴박감</span>
                </div>
                <textarea id="q3" class="quadrant-textarea w-full p-5 resize-none focus:outline-none text-gray-700 leading-relaxed text-sm md:text-base" placeholder="이곳에 내용을 입력하세요..."></textarea>
            </div>

            <!-- Q4: 급하지 않은 일-중요하지 않은일 -->
            <div class="flex flex-col border-2 border-gray-400 rounded-2xl overflow-hidden shadow-sm bg-white transition-all hover:shadow-md focus-within:ring-2 focus-within:ring-gray-100">
                <div class="p-4 bg-gray-400 text-white">
                    <span class="block text-lg font-extrabold leading-tight">급하지 않은 일-중요하지 않은일</span>
                    <span class="text-[10px] md:text-xs font-normal opacity-90 leading-normal">시간 낭비, 소모적 활동, 단순 유흥</span>
                </div>
                <textarea id="q4" class="quadrant-textarea w-full p-5 resize-none focus:outline-none text-gray-700 leading-relaxed text-sm md:text-base" placeholder="이곳에 내용을 입력하세요..."></textarea>
            </div>

        </div>

        <!-- 버튼 영역 -->
        <div class="mt-10 md:mt-14 flex flex-col items-center gap-5">
            <button id="saveBtn" onclick="sendToSheet()" class="w-full md:w-auto flex items-center justify-center gap-3 px-12 py-5 bg-blue-600 hover:bg-blue-700 text-white rounded-full font-bold text-xl shadow-2xl transition-all transform active:scale-95 disabled:bg-gray-400">
                <svg id="sendIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                <svg id="loadingIcon" class="hidden animate-spin h-6 w-6 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                <span>스프레드시트에 저장하기</span>
            </button>

            <div id="statusBox" class="hidden w-full max-w-md flex items-center justify-center gap-2 p-4 rounded-2xl border text-sm font-semibold transition-all">
                <span id="statusText"></span>
            </div>

            <div class="mt-8 text-[11px] md:text-xs text-center text-gray-400 leading-relaxed">
                데이터는 지정된 <a href="https://docs.google.com/spreadsheets/d/1UaF5BCoaCaVQqeQFETqvbHHRxx6P-QKAEqdCvln4Et0/edit?gid=0#gid=0" target="_blank" class="text-blue-400 font-semibold underline underline-offset-4">구글 스프레드시트</a>의 헤더 필드에 맞춰 기록됩니다.
            </div>
        </div>
    </div>

    <script>
        // 여기에 구글 앱스 스크립트 새 배포 URL을 입력하세요.
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxu37MZ6SNohQDYBrKjK4cKUH1lDt8bS3edI8eNxtcULqb_Z0gWDSpPHV2Ntlnre5s/exec"; 

        async function sendToSheet() {
            const data = {
                q1: document.getElementById('q1').value.trim(),
                q2: document.getElementById('q2').value.trim(),
                q3: document.getElementById('q3').value.trim(),
                q4: document.getElementById('q4').value.trim()
            };

            if (!Object.values(data).some(val => val !== "")) {
                showStatus('내용을 입력해 주세요.', 'error');
                return;
            }

            const btn = document.getElementById('saveBtn');
            const icon = document.getElementById('sendIcon');
            const loader = document.getElementById('loadingIcon');

            btn.disabled = true;
            icon.classList.add('hidden');
            loader.classList.remove('hidden');
            showStatus('데이터를 전송 중입니다...', 'info');

            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                showStatus('성공적으로 저장되었습니다!', 'success');
            } catch (error) {
                showStatus('전송 중 오류가 발생했습니다.', 'error');
            } finally {
                btn.disabled = false;
                icon.classList.remove('hidden');
                loader.classList.add('hidden');
            }
        }

        function showStatus(msg, type) {
            const box = document.getElementById('statusBox');
            const text = document.getElementById('statusText');
            box.classList.remove('hidden', 'bg-red-50', 'bg-green-50', 'bg-blue-50', 'border-red-200', 'border-green-200', 'border-blue-200', 'text-red-700', 'text-green-700', 'text-blue-700');
            if (type === 'success') box.classList.add('bg-green-50', 'border-green-200', 'text-green-700');
            else if (type === 'error') box.classList.add('bg-red-50', 'border-red-200', 'text-red-700');
            else box.classList.add('bg-blue-50', 'border-blue-100', 'text-blue-700');
            text.innerText = msg;
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 5000);
        }
    </script>
</body>
</html>
